name: Bug Report
description: Report a bug in Mimo Desktop
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug you encountered
      placeholder: What happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mimo Desktop version
      description: What version are you using? (Check Help > About)
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or recording
      description: Attach a screenshot or recording if applicable
      placeholder: Drag and drop screenshot here
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: false
