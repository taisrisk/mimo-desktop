name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Build desktop
        run: bun run build:desktop
        env:
          MIMO_CHANNEL: prod

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: bun --cwd packages/desktop package:win
        env:
          MIMO_CHANNEL: prod
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        run: bun --cwd packages/desktop package:mac
        env:
          MIMO_CHANNEL: prod
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set APPLE_ID in repo secrets to enable notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: bun --cwd packages/desktop package:linux
        env:
          MIMO_CHANNEL: prod
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.zip
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.deb
            packages/desktop/dist/*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
